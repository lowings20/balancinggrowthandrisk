<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Summary | Spreadsheet Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cell-border: #d1d5db;
      --cell-header-bg: #f3f4f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Public Sans', -apple-system, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      padding: 24px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1e40af;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      color: #111827;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      background: white;
      border: 2px solid var(--cell-border);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn:hover {
      border-color: #9ca3af;
    }

    .tab-btn.active {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1e40af;
      font-weight: 600;
    }

    .tab-btn .icon {
      font-size: 18px;
    }

    /* One-pager card */
    .one-pager {
      background: white;
      border: 1px solid var(--cell-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .pager-header {
      background: linear-gradient(135deg, #1e3a8a, #1e40af);
      color: white;
      padding: 24px;
    }

    .pager-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .pager-icon {
      font-size: 32px;
    }

    .pager-name {
      font-size: 24px;
      font-weight: 700;
    }

    .pager-type {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .pager-description {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }

    /* Metrics grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--cell-border);
      border-bottom: 1px solid var(--cell-border);
    }

    .metric-cell {
      background: white;
      padding: 16px;
      text-align: center;
    }

    .metric-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .metric-value.positive {
      color: #059669;
    }

    .metric-note {
      font-size: 10px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* Cash flow table */
    .table-section {
      padding: 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .sheet-table th,
    .sheet-table td {
      border: 1px solid var(--cell-border);
      padding: 10px 12px;
      text-align: right;
    }

    .sheet-table th {
      background: var(--cell-header-bg);
      font-weight: 600;
      color: #374151;
      text-align: center;
      font-size: 11px;
    }

    .sheet-table .row-header {
      text-align: left;
      background: var(--cell-header-bg);
      font-weight: 500;
      color: #374151;
      width: 130px;
    }

    .cell-negative { color: #dc2626; }
    .cell-positive { color: #059669; }
    .cell-zero { color: #9ca3af; }

    .total-row td {
      font-weight: 700;
      background: #f0f9ff !important;
    }

    .cumulative-row td {
      background: #f9fafb;
      font-size: 11px;
    }

    /* Clickable exit value */
    .clickable-cell {
      cursor: pointer;
      position: relative;
    }

    .clickable-cell:hover {
      background: #fef3c7 !important;
    }

    .info-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      background: #3b82f6;
      color: white;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      max-width: 380px;
      width: 90%;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #6b7280;
    }

    .modal-body {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
    }

    .exit-breakdown {
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
    }

    .exit-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .exit-row:last-child {
      border-bottom: none;
      font-weight: 700;
      color: #059669;
    }

    @media (max-width: 600px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .tab-nav {
        flex-direction: column;
      }
    }

    @media print {
      body { background: white; padding: 0; }
      .back-link, .tab-nav { display: none; }
      .one-pager { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to Showcase</a>
    <h1>Executive Summary</h1>
    <p class="subtitle">One-page financial overview for each project</p>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="showProject('nomadic')">
        <span class="icon">🚐</span> Nomadic Nation
      </button>
      <button class="tab-btn" onclick="showProject('shadow')">
        <span class="icon">🎬</span> Shadow Protocol
      </button>
      <button class="tab-btn" onclick="showProject('silk')">
        <span class="icon">👗</span> Silk and Mahogany
      </button>
    </div>

    <div class="one-pager" id="one-pager">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Exit Value Modal -->
  <div class="modal-overlay" id="exit-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Exit Value</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    const PROJECTS = {
      nomadic: {
        name: 'Nomadic Nation',
        icon: '🚐',
        type: '24-Episode Reality Series',
        description: 'A docuseries following digital nomads building businesses while traveling the world. Low production costs with proven reality TV format. Revenue primarily from streaming rights and advertising.',
        investment: 8,
        cashFlows: [7, 2.5, 0.5, 0, 0],
        exitValue: 1.5,
        totalCF: 11.5,
        ratio: 1.44,
        breakeven: 'Year 1-2',
        rate: 15,
        rateLabel: 'Low-Budget Genre',
        exitBreakdown: { 'Format Licensing': 0.8, 'Library Value': 0.5, 'Merchandise': 0.2 }
      },
      shadow: {
        name: 'The Shadow Protocol',
        icon: '🎬',
        type: 'Action Feature Film',
        description: 'A high-concept espionage thriller with A-list talent attached. Large budget with significant box office and streaming potential. High risk due to production complexity, but strong franchise potential.',
        investment: 50,
        cashFlows: [5, 14, 27, 24, 17],
        exitValue: 28,
        totalCF: 115,
        ratio: 2.30,
        breakeven: 'Year 3-4',
        rate: 23,
        rateLabel: 'High-Concept',
        exitBreakdown: { 'Sequel Rights': 15, 'Franchise Potential': 8, 'Library Value': 5 }
      },
      silk: {
        name: 'Silk and Mahogany',
        icon: '👗',
        type: '8-Episode Period Drama',
        description: 'A prestige limited series set in 1920s Harlem, exploring fashion, music, and the Harlem Renaissance. Awards potential with strong international distribution appeal and catalog value.',
        investment: 25,
        cashFlows: [15, 12, 8.5, 5, 3.5],
        exitValue: 8,
        totalCF: 52,
        ratio: 2.08,
        breakeven: 'Year 1-2',
        rate: 18,
        rateLabel: 'Mid-Budget Original',
        exitBreakdown: { 'International Rights': 4, 'Awards Catalog Value': 2.5, 'Soundtrack/Music': 1.5 }
      }
    };

    let currentProject = 'nomadic';

    function showProject(key) {
      currentProject = key;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        const keys = ['nomadic', 'shadow', 'silk'];
        btn.classList.toggle('active', keys[i] === key);
      });
      render();
    }

    function render() {
      const p = PROJECTS[currentProject];
      const cfWithExit = p.cashFlows.map((cf, i) => i === 4 ? cf + p.exitValue : cf);

      // Cumulative
      const cumulative = [];
      let running = -p.investment;
      cumulative.push(running);
      cfWithExit.forEach(cf => { running += cf; cumulative.push(running); });

      // NPV & IRR
      const npv = calculateNPV(p, p.rate);
      const irr = calculateIRR(p);

      document.getElementById('one-pager').innerHTML = `
        <div class="pager-header">
          <div class="pager-title-row">
            <span class="pager-icon">${p.icon}</span>
            <span class="pager-name">${p.name}</span>
          </div>
          <div class="pager-type">${p.type}</div>
          <div class="pager-description">${p.description}</div>
        </div>

        <div class="metrics-grid">
          <div class="metric-cell">
            <div class="metric-label">Investment</div>
            <div class="metric-value">$${p.investment}M</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Cash Produced</div>
            <div class="metric-value positive">$${p.totalCF}M</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Ratio</div>
            <div class="metric-value">${p.ratio.toFixed(2)}x</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Breakeven</div>
            <div class="metric-value">${p.breakeven}</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Discount Rate</div>
            <div class="metric-value">${p.rate}%</div>
            <div class="metric-note">${p.rateLabel}</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">NPV</div>
            <div class="metric-value positive">$${npv.toFixed(1)}M</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">IRR</div>
            <div class="metric-value positive">${irr.toFixed(0)}%</div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">Exit Value</div>
            <div class="metric-value">$${p.exitValue}M</div>
          </div>
        </div>

        <div class="table-section">
          <div class="section-label">Cash Flow Analysis</div>
          <table class="sheet-table">
            <thead>
              <tr>
                <th class="row-header"></th>
                <th>Year 0</th>
                <th>Year 1</th>
                <th>Year 2</th>
                <th>Year 3</th>
                <th>Year 4</th>
                <th>Year 5</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="row-header">Investment</td>
                <td class="cell-negative">($${p.investment}M)</td>
                <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
                <td class="cell-negative">($${p.investment}M)</td>
              </tr>
              <tr>
                <td class="row-header">Net Cash Flow</td>
                <td>—</td>
                ${p.cashFlows.slice(0, 4).map(cf => `<td class="${cf > 0 ? 'cell-positive' : 'cell-zero'}">${cf > 0 ? '$' + cf + 'M' : '$0'}</td>`).join('')}
                <td class="cell-positive clickable-cell" onclick="showExitModal()">$${cfWithExit[4]}M <span class="info-badge">i</span></td>
                <td class="cell-positive">$${p.totalCF}M</td>
              </tr>
              <tr class="total-row">
                <td class="row-header">Total Cash Flow</td>
                <td class="cell-negative">($${p.investment}M)</td>
                ${cfWithExit.map(cf => `<td class="${cf > 0 ? 'cell-positive' : 'cell-zero'}">${cf > 0 ? '$' + cf + 'M' : '$0'}</td>`).join('')}
                <td class="cell-positive">$${cumulative[cumulative.length - 1]}M</td>
              </tr>
              <tr class="cumulative-row">
                <td class="row-header">Cumulative</td>
                ${cumulative.map(c => `<td class="${c >= 0 ? 'cell-positive' : 'cell-negative'}">${c >= 0 ? '$' + c + 'M' : '($' + Math.abs(c) + 'M)'}</td>`).join('')}
                <td>—</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function calculateNPV(p, rate) {
      const cfWithExit = [...p.cashFlows];
      cfWithExit[4] += p.exitValue;
      let npv = -p.investment;
      cfWithExit.forEach((cf, i) => {
        npv += cf / Math.pow(1 + rate / 100, i + 1);
      });
      return npv;
    }

    function calculateIRR(p) {
      const cfWithExit = [...p.cashFlows];
      cfWithExit[4] += p.exitValue;
      let irr = 0.1;
      for (let iter = 0; iter < 100; iter++) {
        let npv = -p.investment, dnpv = 0;
        cfWithExit.forEach((cf, i) => {
          const t = i + 1;
          npv += cf / Math.pow(1 + irr, t);
          dnpv -= t * cf / Math.pow(1 + irr, t + 1);
        });
        if (Math.abs(dnpv) < 0.0001) break;
        const newIrr = irr - npv / dnpv;
        if (Math.abs(newIrr - irr) < 0.0001) break;
        irr = newIrr;
      }
      return irr * 100;
    }

    function showExitModal() {
      const p = PROJECTS[currentProject];
      document.getElementById('modal-title').textContent = `${p.icon} ${p.name} - Exit Value`;

      let breakdown = '';
      Object.entries(p.exitBreakdown).forEach(([label, value]) => {
        breakdown += `<div class="exit-row"><span>${label}</span><span>$${value}M</span></div>`;
      });
      breakdown += `<div class="exit-row"><span>Total Exit Value</span><span>$${p.exitValue}M</span></div>`;

      document.getElementById('modal-body').innerHTML = `
        <p>Year 5 includes exit value from:</p>
        <div class="exit-breakdown">${breakdown}</div>
      `;
      document.getElementById('exit-modal').classList.add('show');
    }

    function closeModal(event) {
      if (!event || event.target === document.getElementById('exit-modal')) {
        document.getElementById('exit-modal').classList.remove('show');
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Initialize
    render();
  </script>
</body>
</html>
